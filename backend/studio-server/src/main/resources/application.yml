server:
  port: 18080

spring:
  application:
    name: studio-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.188.128:3306/data_aggregation_studio?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:951753}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

studio:
  aggregation-home: ${STUDIO_AGGREGATION_HOME:C:/dev/ideaProject/DataAggregation/package_all/aggregation}
  encryption-secret: studio-secret-key
  worker-code: studio-server-worker
  internal-api-token: ${STUDIO_INTERNAL_API_TOKEN:studio-internal-token}
