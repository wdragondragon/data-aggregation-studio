server:
  port: 18081

spring:
  application:
    name: studio-worker
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/data_aggregation_studio?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

studio:
  aggregation-home: ../../package_all/aggregation
  encryption-secret: studio-secret-key
  worker-code: studio-online-worker-01
